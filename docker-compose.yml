services:
  mongo:
    image: mongo:7
    container_name: travel-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: travel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    container_name: travel-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:7474 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  neo4j-seed:
    image: neo4j:5
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./neo4j-seed.cypher:/seed.cypher:ro
    entrypoint: ["sh", "-c", "cypher-shell -a bolt://neo4j:7687 -u neo4j -p password -f /seed.cypher"]
    restart: "no"

  # app service commented out - we run backend locally
  # app:
  #   build: .
